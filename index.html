<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غرفة عمليات K92</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0d0d0d;
            color: white;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* منع السحب لأسفل لتحديث الصفحة في الجوال */
            overscroll-behavior-y: contain;
        }

        header {
            text-align: center;
            padding: 5px;
            background: #1a1a1a;
            border-bottom: 2px solid #f1c40f;
            margin-bottom: 10px;
        }

        header h1 { font-size: 1.5rem; color: #f1c40f; margin: 0; }

        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 15px;
            flex-grow: 1;
            overflow: hidden;
        }

        .members-pool {
            background: #161616;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .scroll-area {
            overflow-y: auto;
            flex-grow: 1;
            padding: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr auto;
            gap: 10px;
            overflow-y: auto;
        }

        .team-card {
            background: #1e1e1e;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        .team-card h4 { margin: 0 0 8px 0; padding: 5px; border-radius: 4px; text-align: center; font-size: 0.9rem; }

        .attack { border-top: 3px solid #ff4d4d; } .attack h4 { background: #ff4d4d; }
        .defense { border-top: 3px solid #2ecc71; } .defense h4 { background: #2ecc71; }
        .barracks { border-top: 3px solid #f39c12; } .barracks h4 { background: #f39c12; }
        .archers { border-top: 3px solid #3498db; } .archers h4 { background: #3498db; }
        .secondary { border: 1px dashed #777; grid-column: span 2; } .secondary h4 { background: #444; }

        /* تعديل الأيقونة لمنع النسخ */
        .member-item {
            background: #f1c40f;
            color: #000;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: move;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 2px 0 #95a5a6;
            
            /* منع تحديد النص نهائياً */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none; 
        }

        .drop-zone {
            flex-grow: 1;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-content: flex-start;
            border: 1px solid transparent;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- يمنع القائمة اليمين في كل الصفحة -->

    <header>
        <h1>⚔️ إدارة تحالف K92 - التشكيل القتالي</h1>
    </header>

    <div class="main-layout">
        <div class="members-pool">
            <h3>القائمة (58)</h3>
            <div class="scroll-area drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" id="pool">
                <script>
                    const names = [
                        "7 October", "جنرال طويق", "أكتيمور", "صياد فلسطين", "صقر فلسطين", "LIST DEATH",
                        "الاخطبوووووط", "البآرون", "GORDO", "الطيار Iq", "حآيل", "الشـيـب اعدام",
                        "السفياني", "N E N O", "M ALBATAR IQ92", "ظل الرئيس", "عـرفه", "الـعـقـيـد",
                        "STORM 92", "KareemM", "مستلعن 92", "B E L L YY", "Flint J", "سهم FAHAD",
                        "JULIA 92", "صنكووور", "أبو وجد", "الأسطورره", "ابومسلم 92", "العملاق المفترس",
                        "مشاغب كنوني", "المؤسس عثمان", "أريـج", "خيران", "المج92رم", "Wail Blindo",
                        "برق الجنابي", "طه عادل 92", "ابو تركي XX", "Abo Taim", "طناخة عنزي", "غزولي",
                        "الشاوي 5", "1tow", "ابوالوليد", "البآشمهندس", "شااااااااوي", "القنبله",
                        "قس", "DaMAR", "شغب", "وعــد 92", "mashoutenshi", "الشششششششششرر",
                        "Darsh777", "الباشا 92", "ابـوتـيـم", "صنكوررر"
                    ];

                    names.forEach((name, index) => {
                        document.write(`<div class="member-item" draggable="true" ondragstart="drag(event)" id="p${index}">${name}</div>`);
                    });
                </script>
            </div>
        </div>

        <div class="teams-grid">
            <div class="team-card attack">
                <h4>⚔️ فريق الهجوم</h4>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>
            <div class="team-card defense">
                <h4>🛡️ فريق الدفاع بمملكتنا</h4>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>
            <div class="team-card barracks">
                <h4>🐎 حشود ثكنة</h4>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>
            <div class="team-card archers">
                <h4>🏹 حشود رماه</h4>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>
            <div class="team-card secondary">
                <h4>⚙️ حشود ثانوية</h4>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>
        </div>
    </div>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var draggedElement = document.getElementById(data);
            let target = ev.target;
            while (target && !target.classList.contains('drop-zone')) { target = target.parentElement; }
            if (target) { target.appendChild(draggedElement); }
        }
    </script>
</body>
</html>
